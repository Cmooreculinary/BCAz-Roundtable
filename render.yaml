services:
  - type: web
    name: micro-backend
    runtime: python
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn server:app --host 0.0.0.0 --port $PORT
    disk:
      name: micro-data
      mountPath: /opt/data
      sizeGB: 5
    envVars:
      - key: DB_NAME
        value: micro
      - key: SQLITE_PATH
        value: /opt/data/micro.sqlite3
      - key: UPLOAD_ROOT
        value: /opt/data/uploads
      - key: APP_NAME
        value: micro
      - key: JWT_SECRET
        generateValue: true
      - key: CORS_ORIGINS
        value: https://micro-frontend.onrender.com
      - key: VAPID_PRIVATE_KEY
        sync: false
      - key: VAPID_PUBLIC_KEY
        sync: false
      - key: VAPID_CLAIMS_EMAIL
        sync: false
      - key: TWILIO_ACCOUNT_SID
        sync: false
      - key: TWILIO_AUTH_TOKEN
        sync: false
      - key: TWILIO_FROM_NUMBER
        sync: false
      - key: ANTHROPIC_API_KEY
        sync: false

  - type: web
    name: micro-frontend
    runtime: static
    rootDir: frontend
    buildCommand: npm install --legacy-peer-deps --package-lock=false && npm run build
    staticPublishPath: build
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    envVars:
      - key: REACT_APP_BACKEND_URL
        value: https://micro-backend.onrender.com
